name: solarcurve
region: nyc
static_sites:
  - name: www
    source_dir: /
    github:
      repo: SolarCurve/www.solarcurve.com
      branch: main
      deploy_on_push: true
    build_command: npm run build
    output_dir: dist
    index_document: index.html
    error_document: 404.html
    envs:
      - key: SOLAR_PHASE
        value: permitted
        scope: BUILD_TIME
      - key: STEAM_API_KEY
        value: ""
        scope: BUILD_TIME
        type: SECRET
      - key: STEAM_VANITY_URL
        value: solarcurve
        scope: BUILD_TIME
