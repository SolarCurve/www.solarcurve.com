name: solarcurve
region: nyc
static_sites:
  - name: www
    source_dir: /
    github:
      repo: SolarCurve/www.solarcurve.com
      branch: main
      deploy_on_push: true
    build_command: npm run build
    output_dir: dist
    index_document: index.html
    error_document: 404.html
    # NOTE: this file does NOT sync to DigitalOcean — the dashboard App Spec is
    # canonical. Env vars live there as app-level variables (SOLAR_PHASE=live,
    # STEAM_API_KEY as an encrypted secret). Values below are documentation only.
    envs:
      - key: SOLAR_PHASE
        value: live
        scope: BUILD_TIME
      - key: STEAM_API_KEY
        value: ""
        scope: BUILD_TIME
        type: SECRET
